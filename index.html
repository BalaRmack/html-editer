<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodePad — HTML Редактор</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --bg-secondary: #161b22; --bg-tertiary: #1c2333;
      --fg: #c9d1d9; --fg-muted: #8b949e; --accent: #00d4aa; --accent-hover: #00f0c0;
      --accent-dim: rgba(0,212,170,0.08); --border: #30363d;
      --tab-active: #0d1117; --tab-inactive: #1c2333;
      --error: #f85149; --warn: #d29922;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--fg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0; z-index: 100; }
    .toolbar-left, .toolbar-center, .toolbar-right { display: flex; align-items: center; gap: 8px; }
    .logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.15rem; color: var(--accent); display: flex; align-items: center; gap: 8px; letter-spacing: -0.5px; margin-right: 8px; }
    .logo i { font-size: 1.2rem; }
    .mode-switch { display: flex; background: var(--bg); border-radius: 8px; padding: 3px; border: 1px solid var(--border); }
    .mode-btn { padding: 6px 14px; border: none; background: transparent; color: var(--fg-muted); font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
    .mode-btn.active { background: var(--accent); color: #0d1117; }
    .mode-btn:hover:not(.active) { color: var(--fg); }
    .btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--fg); font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.2s; white-space: nowrap; }
    .btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .btn.primary { background: var(--accent); color: #0d1117; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #0d1117; }
    .btn.icon-only { padding: 7px 10px; }
    .auto-run-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--fg-muted); cursor: pointer; user-select: none; }
    .toggle-switch { width: 32px; height: 18px; background: var(--border); border-radius: 9px; position: relative; transition: background 0.2s; }
    .toggle-switch.active { background: var(--accent); }
    .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
    .toggle-switch.active::after { transform: translateX(14px); }
    .main-container { flex: 1; display: flex; overflow: hidden; position: relative; }
    .main-container.vertical { flex-direction: column; }
    .editor-panel { display: flex; flex-direction: column; min-width: 200px; min-height: 150px; overflow: hidden; }
    .editor-tabs { display: flex; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .editor-tab { padding: 8px 18px; background: var(--tab-inactive); color: var(--fg-muted); border: none; border-right: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; position: relative; display: flex; align-items: center; gap: 6px; }
    .editor-tab.active { background: var(--tab-active); color: var(--accent); }
    .editor-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
    .editor-tab:hover:not(.active) { color: var(--fg); background: rgba(0,212,170,0.05); }
    .editor-tab .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-html { background: #f85149; } .dot-css { background: #58a6ff; } .dot-js { background: #d29922; }
    .editor-wrapper { flex: 1; overflow: hidden; position: relative; }
    .editor-wrapper.hidden { display: none; }
    .editor-wrapper .CodeMirror { height: 100%; font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.6; }
    .resizer { flex-shrink: 0; background: var(--border); position: relative; z-index: 10; transition: background 0.15s; }
    .resizer:hover, .resizer.active { background: var(--accent); }
    .resizer.horizontal { width: 4px; cursor: col-resize; } .resizer.vertical { height: 4px; cursor: row-resize; }
    .preview-panel { flex: 1; display: flex; flex-direction: column; min-width: 200px; min-height: 150px; overflow: hidden; }
    .preview-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: var(--bg-tertiary); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .preview-title { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--fg-muted); display: flex; align-items: center; gap: 6px; }
    .preview-title i { color: var(--accent); }
    .preview-url { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--fg-muted); background: var(--bg); padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border); flex: 1; margin: 0 12px; }
    .preview-iframe-wrapper { flex: 1; background: #fff; position: relative; min-height: 80px; }
    .preview-iframe-wrapper iframe { width: 100%; height: 100%; border: none; }
    .console-panel { height: 160px; border-top: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg); flex-shrink: 0; transition: height 0.25s ease; overflow: hidden; }
    .console-panel.collapsed { height: 0; border-top: none; }
    .console-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 12px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .console-header-left { display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--fg-muted); }
    .console-badge { background: var(--error); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 1px 6px; border-radius: 8px; display: none; }
    .console-badge.visible { display: inline-block; }
    .console-btn { background: none; border: none; color: var(--fg-muted); cursor: pointer; padding: 2px 6px; font-size: 0.75rem; border-radius: 4px; transition: all 0.15s; }
    .console-btn:hover { color: var(--fg); background: rgba(255,255,255,0.05); }
    .console-body { flex: 1; overflow-y: auto; padding: 6px 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; }
    .console-msg { padding: 3px 0; border-bottom: 1px solid rgba(48,54,61,0.4); display: flex; gap: 8px; align-items: flex-start; word-break: break-word; }
    .console-msg:last-child { border-bottom: none; }
    .console-msg.error { color: var(--error); } .console-msg.warn { color: var(--warn); } .console-msg.log { color: var(--fg); }
    .console-msg .msg-icon { width: 16px; text-align: center; flex-shrink: 0; margin-top: 2px; }
    .console-msg.error .msg-icon { color: var(--error); } .console-msg.warn .msg-icon { color: var(--warn); } .console-msg.log .msg-icon { color: var(--fg-muted); }
    .console-msg .msg-text { flex: 1; white-space: pre-wrap; }
    .console-empty { color: var(--fg-muted); font-style: italic; padding: 8px 0; font-size: 0.75rem; }
    .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 4px 16px; background: var(--bg-secondary); border-top: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--fg-muted); flex-shrink: 0; }
    .status-left, .status-right { display: flex; align-items: center; gap: 16px; }
    .status-item { display: flex; align-items: center; gap: 4px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .toast-container { position: fixed; top: 60px; right: 16px; z-index: 10000; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 10px 18px; background: var(--bg-secondary); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 8px; color: var(--fg); font-size: 0.85rem; font-family: 'Space Grotesk', sans-serif; animation: toastIn 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .toast.fade-out { animation: toastOut 0.3s ease forwards; }
    @keyframes toastIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100px); opacity: 0; } }
    .CodeMirror { background: var(--bg) !important; color: var(--fg) !important; }
    .CodeMirror-gutters { background: var(--bg-secondary) !important; border-right: 1px solid var(--border) !important; }
    .CodeMirror-linenumber { color: var(--fg-muted) !important; font-size: 0.75rem; }
    .CodeMirror-cursor { border-left-color: var(--accent) !important; }
    .CodeMirror-selected { background: rgba(0,212,170,0.15) !important; }
    .CodeMirror-activeline-background { background: rgba(0,212,170,0.05) !important; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }
    @media (max-width: 768px) { .toolbar { padding: 6px 10px; flex-wrap: wrap; gap: 6px; } .btn span { display: none; } .mode-btn { padding: 5px 10px; font-size: 0.75rem; } .preview-url { display: none; } .logo { font-size: 1rem; } .toolbar-center { display: none; } }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="logo"><i class="fa-solid fa-code"></i> CodePad</div>
      <div class="mode-switch">
        <button class="mode-btn active" data-mode="single" onclick="setMode('single')">Один файл</button>
        <button class="mode-btn" data-mode="multi" onclick="setMode('multi')">Раздельные</button>
      </div>
    </div>
    <div class="toolbar-center">
      <label class="auto-run-toggle" onclick="toggleAutoRun()">
        <div class="toggle-switch active" id="autoRunToggle"></div> Автозапуск
      </label>
    </div>
    <div class="toolbar-right">
      <button class="btn icon-only" onclick="swapPanels()" title="Поменять панели"><i class="fa-solid fa-right-left"></i></button>
      <button class="btn icon-only" onclick="toggleLayout()" title="Расположение"><i class="fa-solid fa-up-down-left-right"></i></button>
      <button class="btn primary" onclick="runCode()" title="Запустить (Ctrl+Enter)"><i class="fa-solid fa-play"></i><span>Запустить</span></button>
      <button class="btn" onclick="openInNewTab()" title="Открыть в новой вкладке"><i class="fa-solid fa-up-right-from-square"></i><span>Открыть</span></button>
      <button class="btn" onclick="downloadFile()" title="Скачать (Ctrl+S)"><i class="fa-solid fa-download"></i><span>Скачать</span></button>
    </div>
  </div>
  <div class="main-container" id="mainContainer">
    <div class="editor-panel" id="editorPanel" style="width:50%;">
      <div class="editor-tabs" id="editorTabs" style="display:none;"></div>
      <div class="editor-wrapper" id="editorWrapperHtml"><textarea id="codeHtml"></textarea></div>
      <div class="editor-wrapper hidden" id="editorWrapperCss"><textarea id="codeCss"></textarea></div>
      <div class="editor-wrapper hidden" id="editorWrapperJs"><textarea id="codeJs"></textarea></div>
    </div>
    <div class="resizer horizontal" id="resizer"></div>
    <div class="preview-panel" id="previewPanel">
      <div class="preview-header">
        <div class="preview-title"><i class="fa-solid fa-eye"></i> Предпросмотр</div>
        <div class="preview-url">localhost:preview</div>
        <div style="display:flex;gap:4px;">
          <button class="console-btn" onclick="toggleConsole()" title="Консоль"><i class="fa-solid fa-terminal"></i></button>
          <button class="console-btn" onclick="refreshPreview()" title="Обновить"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
      </div>
      <div class="preview-iframe-wrapper">
        <!-- ИСПРАВЛЕНО: добавлено allow-pointer-lock -->
        <iframe id="previewFrame" sandbox="allow-scripts allow-modals allow-same-origin allow-forms allow-popups allow-pointer-lock"></iframe>
      </div>
      <div class="console-panel" id="consolePanel">
        <div class="console-header">
          <div class="console-header-left"><i class="fa-solid fa-terminal"></i> Консоль <span class="console-badge" id="consoleBadge">0</span></div>
          <div style="display:flex;gap:4px;">
            <button class="console-btn" onclick="clearConsole()" title="Очистить"><i class="fa-solid fa-ban"></i></button>
            <button class="console-btn" onclick="toggleConsole()" title="Свернуть"><i class="fa-solid fa-chevron-down" id="consoleToggleIcon"></i></button>
          </div>
        </div>
        <div class="console-body" id="consoleBody"><div class="console-empty">Консоль пуста.</div></div>
      </div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-left"><div class="status-item"><div class="status-dot"></div> Готов</div><div class="status-item" id="statusMode">Один файл</div></div>
    <div class="status-right"><div class="status-item" id="statusCursor">Стр: 1, Стб: 1</div><div class="status-item" id="statusChars">0</div><div class="status-item" id="statusLines">0</div></div>
  </div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>

  <script>
    let currentMode='single',autoRun=true,isHorizontal=true,isSwapped=false,debounceTimer=null,activeTab='html',errorCount=0;
    const singleTemplate=`<!DOCTYPE html>\n<html lang="ru">\n<head>\n  <meta charset="UTF-8">\n  <title>Тест</title>\n  <style>\n    body { background: #1a1a2e; color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }\n    h1 { color: #00d4aa; }\n  </style>\n</head>\n<body>\n  <h1>Привет, CodePad!</h1>\n</body>\n</html>`;
    const multiHtml=`<!DOCTYPE html>\n<html lang="ru">\n<head>\n  <meta charset="UTF-8">\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1>Раздельные файлы</h1>\n  <script src="script.js"><\/script>\n</body>\n</html>`;
    const multiCss=`h1 { color: #00d4aa; font-family: sans-serif; }`;
    const multiJs=`console.log('JS загружен!');`;
    const consoleProxyScript=`<`+`script>(function(){var o={log:console.log,warn:console.warn,error:console.error};function s(l,a){try{var m=Array.from(a).map(function(v){if(v===null)return'null';if(v===undefined)return'undefined';if(typeof v==='object'){try{return JSON.stringify(v,null,2)}catch(e){return String(v)}}return String(v)}).join(' ');parent.postMessage({type:'codepad-console',level:l,message:m},'*')}catch(e){}if(l==='error')o.error.apply(console,a);else if(l==='warn')o.warn.apply(console,a);else o.log.apply(console,a)}console.log=function(){s('log',arguments)};console.warn=function(){s('warn',arguments)};console.error=function(){s('error',arguments)};window.onerror=function(m,u,l){s('error',['Error: '+m+' (строка '+l+')'])};window.addEventListener('unhandledrejection',function(e){s('error',['Promise: '+(e.reason&&e.reason.message?e.reason.message:e.reason)])})})()<`+`/script>`;
    let editorHtml,editorCss,editorJs;
    function initEditors(){const b={lineNumbers:true,autoCloseTags:true,autoCloseBrackets:true,matchBrackets:true,styleActiveLine:true,tabSize:2,indentWithTabs:false,lineWrapping:false,theme:'material-darker'};editorHtml=CodeMirror.fromTextArea(document.getElementById('codeHtml'),{...b,mode:'htmlmixed'});editorCss=CodeMirror.fromTextArea(document.getElementById('codeCss'),{...b,mode:'css'});editorJs=CodeMirror.fromTextArea(document.getElementById('codeJs'),{...b,mode:'javascript'});editorHtml.setValue(singleTemplate);editorCss.setValue(multiCss);editorJs.setValue(multiJs);[editorHtml,editorCss,editorJs].forEach(ed=>{ed.on('change',()=>{updateStatus();if(autoRun){clearTimeout(debounceTimer);debounceTimer=setTimeout(runCode,400)}});ed.on('cursorActivity',updateStatus)})}
    function updateStatus(){const ed=getActiveEditor();if(!ed)return;const v=ed.getValue(),c=ed.getCursor();document.getElementById('statusChars').textContent=v.length+' символов';document.getElementById('statusLines').textContent=ed.lineCount()+' строк';document.getElementById('statusCursor').textContent=`Стр: ${c.line+1}, Стб: ${c.ch+1}`}
    function getActiveEditor(){if(currentMode==='single')return editorHtml;return{html:editorHtml,css:editorCss,js:editorJs}[activeTab]||editorHtml}
    function setMode(mode){const p=currentMode;currentMode=mode;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));const t=document.getElementById('editorTabs');if(mode==='single'){t.style.display='none';if(p==='multi')editorHtml.setValue(singleTemplate);showEditor('html');document.getElementById('statusMode').textContent='Один файл'}else{t.style.display='flex';if(p==='single'){editorHtml.setValue(multiHtml);editorCss.setValue(multiCss);editorJs.setValue(multiJs)}switchToTab('html');document.getElementById('statusMode').textContent='Раздельные файлы'}renderTabs();runCode()}
    function renderTabs(){const t=document.getElementById('editorTabs');if(currentMode==='single'){t.innerHTML='';return}const tabs=[{id:'html',label:'index.html',dot:'dot-html'},{id:'css',label:'style.css',dot:'dot-css'},{id:'js',label:'script.js',dot:'dot-js'}];t.innerHTML=tabs.map(t=>`<button class="editor-tab ${t.id===activeTab?'active':''}" onclick="switchToTab('${t.id}')"><span class="dot ${t.dot}"></span>${t.label}</button>`).join('')}
    function switchToTab(tab){activeTab=tab;showEditor(tab);renderTabs();updateStatus();const ed=getActiveEditor();if(ed)setTimeout(()=>{ed.refresh();ed.focus()},30)}
    function showEditor(tab){['html','css','js'].forEach(t=>{document.getElementById('editorWrapper'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('hidden',t!==tab)});setTimeout(()=>[editorHtml,editorCss,editorJs].forEach(e=>e.refresh()),20)}
    function buildOutput(){let r;if(currentMode==='single'){r=editorHtml.getValue()}else{const h=editorHtml.getValue(),c=editorCss.getValue(),j=editorJs.getValue();r=h;r=r.replace(/<link[^>]*href=["']style\.css["'][^>]*\/?>/gi,`<style>${c}</style>`);r=r.replace(/<script[^>]*src=["']script\.js["'][^>]*><\/script>/gi,`<script>${j}<\/script>`);if(c.trim()&&!r.includes(c))r=r.replace('</head>',`<style>${c}</style>\n</head>`);if(j.trim()&&!r.includes(j))r=r.replace('</body>',`<script>${j}<\/script>\n</body>`)}if(r.includes('<head>'))r=r.replace('<head>','<head>'+consoleProxyScript);else r=consoleProxyScript+r;return r}
    function runCode(){clearConsole();document.getElementById('previewFrame').srcdoc=buildOutput()}
    function refreshPreview(){runCode();showToast('Обновлено')}
    function clearConsole(){errorCount=0;document.getElementById('consoleBody').innerHTML='<div class="console-empty">Консоль пуста.</div>';updateBadge()}
    function toggleConsole(){const p=document.getElementById('consolePanel'),i=document.getElementById('consoleToggleIcon');p.classList.toggle('collapsed');i.className=p.classList.contains('collapsed')?'fa-solid fa-chevron-up':'fa-solid fa-chevron-down'}
    function appendToConsole(level,msg){const b=document.getElementById('consoleBody'),e=b.querySelector('.console-empty');if(e)e.remove();const d=document.createElement('div');d.className='console-msg '+level;const icons={log:'fa-chevron-right',warn:'fa-triangle-exclamation',error:'fa-circle-xmark'};d.innerHTML=`<span class="msg-icon"><i class="fa-solid ${icons[level]||icons.log}"></i></span><span class="msg-text">${msg.replace(/</g,'&lt;')}</span>`;b.appendChild(d);b.scrollTop=b.scrollHeight;if(level==='error'){errorCount++;updateBadge();const p=document.getElementById('consolePanel');if(p.classList.contains('collapsed'))toggleConsole()}}
    function updateBadge(){const b=document.getElementById('consoleBadge');if(errorCount>0){b.textContent=errorCount;b.classList.add('visible')}else b.classList.remove('visible')}
    window.addEventListener('message',e=>{if(e.data&&e.data.type==='codepad-console')appendToConsole(e.data.level,e.data.message)});
    function openInNewTab(){let o;if(currentMode==='single')o=editorHtml.getValue();else{const h=editorHtml.getValue(),c=editorCss.getValue(),j=editorJs.getValue();o=h;o=o.replace(/<link[^>]*href=["']style\.css["'][^>]*\/?>/gi,`<style>${c}</style>`);o=o.replace(/<script[^>]*src=["']script\.js["'][^>]*><\/script>/gi,`<script>${j}<\/script>`);if(c.trim()&&!o.includes(c))o=o.replace('</head>',`<style>${c}</style>\n</head>`);if(j.trim()&&!o.includes(j))o=o.replace('</body>',`<script>${j}<\/script>\n</body>`)}window.open(URL.createObjectURL(new Blob([o],{type:'text/html'})),'_blank');showToast('Открыто в новой вкладке')}
    function downloadFile(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([buildOutput()],{type:'text/html'}));a.download='index.html';a.click();showToast('Скачано')}
    function toggleAutoRun(){autoRun=!autoRun;document.getElementById('autoRunToggle').classList.toggle('active',autoRun);showToast(autoRun?'Автозапуск вкл':'Автозапуск выкл')}
    function toggleLayout(){isHorizontal=!isHorizontal;const c=document.getElementById('mainContainer'),r=document.getElementById('resizer'),e=document.getElementById('editorPanel');c.classList.toggle('vertical',!isHorizontal);r.classList.toggle('horizontal',isHorizontal);r.classList.toggle('vertical',!isHorizontal);e.style.width='';e.style.height='';e.style.flex='1';setTimeout(()=>[editorHtml,editorCss,editorJs].forEach(e=>e.refresh()),50);showToast(isHorizontal?'Горизонтально':'Вертикально')}
    function swapPanels(){isSwapped=!isSwapped;const c=document.getElementById('mainContainer'),e=document.getElementById('editorPanel'),p=document.getElementById('previewPanel'),r=document.getElementById('resizer');if(isSwapped){c.insertBefore(p,e);c.insertBefore(r,e)}else{c.insertBefore(e,r);c.insertBefore(r,p)}showToast('Панели поменяны')}
    function initResizer(){const r=document.getElementById('resizer'),c=document.getElementById('mainContainer'),e=document.getElementById('editorPanel');let d=false;function s(e){d=true;r.classList.add('active');document.body.style.cursor=isHorizontal?'col-resize':'row-resize';document.body.style.userSelect='none';document.getElementById('previewFrame').style.pointerEvents='none';e.preventDefault()}function m(x,y){if(!d)return;const b=c.getBoundingClientRect();if(isHorizontal){e.style.width=Math.max(15,Math.min(85,((x-b.left)/b.width)*100))+'%';e.style.flex='none'}else{e.style.height=Math.max(15,Math.min(85,((y-b.top)/b.height)*100))+'%';e.style.flex='none'}}function end(){if(!d)return;d=false;r.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect='';document.getElementById('previewFrame').style.pointerEvents='';[editorHtml,editorCss,editorJs].forEach(e=>e.refresh())}r.addEventListener('mousedown',s);document.addEventListener('mousemove',e=>m(e.clientX,e.clientY));document.addEventListener('mouseup',end);r.addEventListener('touchstart',s,{passive:false});document.addEventListener('touchmove',e=>{if(d)m(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});document.addEventListener('touchend',end)}
    function showToast(msg){const c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.classList.add('fade-out');setTimeout(()=>t.remove(),300)},2000)}
    document.addEventListener('keydown',e=>{const m=e.ctrlKey||e.metaKey;if(m&&e.key==='Enter'){e.preventDefault();runCode();showToast('Запущено')}if(m&&e.key==='s'){e.preventDefault();downloadFile()}if(m&&e.shiftKey&&(e.key==='O'||e.key==='o')){e.preventDefault();openInNewTab()}});
    window.addEventListener('DOMContentLoaded',()=>{initEditors();renderTabs();initResizer();updateStatus();setTimeout(runCode,150)});
  </script>
</body>
