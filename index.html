<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodePad — Редактор с ИИ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--fg:#c9d1d9;--fgm:#8b949e;--acc:#00d4aa;--acch:#00f0c0;--accd:rgba(0,212,170,.08);--brd:#30363d;--err:#f85149;--wrn:#d29922}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden;display:flex;flex-direction:column}
    .toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--brd);gap:10px;flex-shrink:0;z-index:100}
    .tl,.tc,.tr{display:flex;align-items:center;gap:8px}
    .logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1.1rem;color:var(--acc);display:flex;align-items:center;gap:8px;margin-right:6px}
    .ms{display:flex;background:var(--bg);border-radius:8px;padding:3px;border:1px solid var(--brd)}
    .mb{padding:6px 14px;border:none;background:0;color:var(--fgm);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;border-radius:6px;transition:.2s}
    .mb.a{background:var(--acc);color:#0d1117}.mb:hover:not(.a){color:var(--fg)}
    .btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--brd);background:var(--bg3);color:var(--fg);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;border-radius:8px;transition:.2s;white-space:nowrap}
    .btn:hover{border-color:var(--acc);color:var(--acc);background:var(--accd)}
    .btn.p{background:var(--acc);color:#0d1117;border-color:var(--acc)}.btn.p:hover{background:var(--acch);border-color:var(--acch);color:#0d1117}
    .btn.io{padding:7px 10px}
    .art{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--fgm);cursor:pointer;user-select:none}
    .ts{width:32px;height:18px;background:var(--brd);border-radius:9px;position:relative;transition:.2s}
    .ts.a{background:var(--acc)}.ts::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.2s}.ts.a::after{transform:translateX(14px)}
    .mc{flex:1;display:flex;overflow:hidden;position:relative}.mc.v{flex-direction:column}
    .ep{display:flex;flex-direction:column;min-width:200px;min-height:150px;overflow:hidden}
    .et{display:flex;background:var(--bg3);border-bottom:1px solid var(--brd);flex-shrink:0}
    .etab{padding:8px 18px;background:var(--bg3);color:var(--fgm);border:none;border-right:1px solid var(--brd);font-family:'JetBrains Mono',monospace;font-size:.78rem;cursor:pointer;transition:.2s;position:relative;display:flex;align-items:center;gap:6px}
    .etab.a{background:var(--bg);color:var(--acc)}.etab.a::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--acc)}
    .etab:hover:not(.a){color:var(--fg);background:rgba(0,212,170,.05)}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.dh{background:#f85149}.dc{background:#58a6ff}.dj{background:#d29922}
    .ew{flex:1;overflow:hidden;position:relative}.ew.h{display:none}
    .ew .CodeMirror{height:100%;font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.6}
    .rz{flex-shrink:0;background:var(--brd);position:relative;z-index:10;transition:.15s}.rz:hover,.rz.a{background:var(--acc)}
    .rz.hz{width:4px;cursor:col-resize}.rz.vt{height:4px;cursor:row-resize}
    .pp{flex:1;display:flex;flex-direction:column;min-width:200px;min-height:150px;overflow:hidden}
    .ph{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg3);border-bottom:1px solid var(--brd);flex-shrink:0}
    .pt{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--fgm);display:flex;align-items:center;gap:6px}.pt i{color:var(--acc)}
    .purl{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--fgm);background:var(--bg);padding:3px 10px;border-radius:4px;border:1px solid var(--brd);flex:1;margin:0 12px}
    .pfw{flex:1;background:#fff;position:relative;min-height:80px}.pfw iframe{width:100%;height:100%;border:none}
    .cp{height:160px;border-top:1px solid var(--brd);display:flex;flex-direction:column;background:var(--bg);flex-shrink:0;transition:height .25s;overflow:hidden}.cp.col{height:0;border-top:none}
    .chh{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:var(--bg2);border-bottom:1px solid var(--brd);flex-shrink:0}
    .chl{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--fgm)}
    .cbg{background:var(--err);color:#fff;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:8px;display:none}.cbg.v{display:inline-block}
    .cbtn{background:0;border:0;color:var(--fgm);cursor:pointer;padding:2px 6px;font-size:.75rem;border-radius:4px;transition:.15s}.cbtn:hover{color:var(--fg);background:rgba(255,255,255,.05)}
    .cbd{flex:1;overflow-y:auto;padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:.78rem}
    .cmsg{padding:3px 0;border-bottom:1px solid rgba(48,54,61,.4);display:flex;gap:8px;align-items:flex-start;word-break:break-word}.cmsg:last-child{border-bottom:none}
    .cmsg.er{color:var(--err)}.cmsg.wr{color:var(--wrn)}.cmsg.lg{color:var(--fg)}
    .cmsg .mi{width:16px;text-align:center;flex-shrink:0;margin-top:2px}.cmsg.er .mi{color:var(--err)}.cmsg.wr .mi{color:var(--wrn)}.cmsg.lg .mi{color:var(--fgm)}
    .cmsg .mt{flex:1;white-space:pre-wrap}.ce{color:var(--fgm);font-style:italic;padding:8px 0;font-size:.75rem}
    .sb{display:flex;align-items:center;justify-content:space-between;padding:4px 16px;background:var(--bg2);border-top:1px solid var(--brd);font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--fgm);flex-shrink:0}
    .sl,.sr{display:flex;align-items:center;gap:16px}.si{display:flex;align-items:center;gap:4px}
    .sd{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .tstc{position:fixed;top:60px;right:16px;z-index:10000;display:flex;flex-direction:column;gap:8px}
    .tst{padding:10px 18px;background:var(--bg2);border:1px solid var(--brd);border-left:3px solid var(--acc);border-radius:8px;color:var(--fg);font-size:.85rem;font-family:inherit;animation:ti .3s;box-shadow:0 8px 24px rgba(0,0,0,.4)}.tst.fo{animation:to .3s forwards}
    @keyframes ti{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes to{from{transform:translateX(0);opacity:1}to{transform:translateX(100px);opacity:0}}
    .CodeMirror{background:var(--bg)!important;color:var(--fg)!important}
    .CodeMirror-gutters{background:var(--bg2)!important;border-right:1px solid var(--brd)!important}
    .CodeMirror-linenumber{color:var(--fgm)!important;font-size:.75rem}
    .CodeMirror-cursor{border-left-color:var(--acc)!important}
    .CodeMirror-selected{background:rgba(0,212,170,.15)!important}
    .CodeMirror-activeline-background{background:rgba(0,212,170,.05)!important}
    ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--fgm)}

    #aiFab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#00d4aa,#00b894);color:#0d1117;border:none;font-size:1.4rem;cursor:pointer;z-index:200;box-shadow:0 4px 20px rgba(0,212,170,.35);transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center}
    #aiFab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(0,212,170,.5)}
    #aiChat{position:fixed;bottom:90px;right:24px;width:400px;height:560px;background:var(--bg2);border:1px solid var(--brd);border-radius:16px;z-index:200;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.5);transition:opacity .25s,transform .25s;transform-origin:bottom right}
    #aiChat.hidden{opacity:0;transform:scale(.9);pointer-events:none}
    .aiH{padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .aiH h3{font-size:.9rem;display:flex;align-items:center;gap:8px;color:var(--acc);font-family:'JetBrains Mono',monospace}
    .aiMs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .aiM{max-width:92%;padding:10px 14px;border-radius:12px;font-size:.85rem;line-height:1.5;word-break:break-word;white-space:pre-wrap}
    .aiM.u{background:var(--acc);color:#0d1117;align-self:flex-end;border-bottom-right-radius:4px}
    .aiM.b{background:var(--bg3);color:var(--fg);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--brd)}
    .aiM.b code{background:rgba(0,212,170,.1);padding:1px 4px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:.8rem}
    .aiM.b strong{color:var(--acc)}
    .aiDiff{margin-top:8px;background:var(--bg);border:1px solid var(--brd);border-radius:8px;overflow:hidden;font-family:'JetBrains Mono',monospace;font-size:.75rem}
    .aiDiffH{padding:4px 10px;background:rgba(0,212,170,.1);color:var(--acc);font-weight:700;display:flex;justify-content:space-between;align-items:center}
    .aiDiffPre{padding:8px 10px;max-height:150px;overflow-y:auto;white-space:pre-wrap;color:var(--fgm);line-height:1.4}
    .aiDiffPre .del{color:var(--err);text-decoration:line-through;opacity:.7}
    .aiDiffPre .add{color:var(--acc)}
    .aiAp{margin-top:8px;padding:7px 16px;background:var(--acc);color:#0d1117;border:none;border-radius:6px;font-weight:700;font-size:.8rem;cursor:pointer;font-family:inherit;transition:.15s}
    .aiAp:hover{background:var(--acch)}.aiAp:disabled{opacity:.5;cursor:not-allowed}
    .aiQa{padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--brd);background:var(--bg3);flex-shrink:0}
    .aiQb{padding:5px 10px;background:var(--bg);border:1px solid var(--brd);color:var(--fgm);border-radius:6px;font-size:.72rem;cursor:pointer;font-family:inherit;transition:.15s;font-weight:600}
    .aiQb:hover{border-color:var(--acc);color:var(--acc);background:var(--accd)}
    .aiIn{padding:12px;border-top:1px solid var(--brd);display:flex;gap:8px;flex-shrink:0;background:var(--bg3)}
    .aiIn textarea{flex:1;background:var(--bg);border:1px solid var(--brd);color:var(--fg);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:.85rem;resize:none;outline:none;min-height:40px;max-height:100px;transition:border-color .2s}
    .aiIn textarea:focus{border-color:var(--acc)}
    .aiIn button{width:40px;height:40px;border:none;background:var(--acc);color:#0d1117;border-radius:8px;cursor:pointer;font-size:1rem;transition:.15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .aiIn button:hover{background:var(--acch)}.aiIn button:disabled{opacity:.5;cursor:not-allowed}
    .aiTy{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
    .aiTy span{width:8px;height:8px;background:var(--fgm);border-radius:50%;animation:bounce 1.4s infinite}
    .aiTy span:nth-child(2){animation-delay:.2s}.aiTy span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
    .aiErr{color:var(--err);font-style:italic}
    @media(max-width:768px){.toolbar{padding:6px 10px;flex-wrap:wrap;gap:6px}.btn span{display:none}.mb{padding:5px 10px;font-size:.75rem}.purl{display:none}.logo{font-size:1rem}.tc{display:none}#aiChat{width:calc(100vw - 16px);right:8px;bottom:80px;height:65vh}}
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="tl">
      <div class="logo"><i class="fa-solid fa-code"></i> CodePad</div>
      <div class="ms">
        <button class="mb a" data-mode="single" onclick="setMode('single')">Один файл</button>
        <button class="mb" data-mode="multi" onclick="setMode('multi')">Раздельные</button>
      </div>
    </div>
    <div class="tc"><label class="art" onclick="toggleAutoRun()"><div class="ts a" id="arT"></div> Автозапуск</label></div>
    <div class="tr">
      <button class="btn io" onclick="swapPanels()" title="Поменять"><i class="fa-solid fa-right-left"></i></button>
      <button class="btn io" onclick="toggleLayout()" title="Расположение"><i class="fa-solid fa-up-down-left-right"></i></button>
      <button class="btn p" onclick="runCode()" title="Ctrl+Enter"><i class="fa-solid fa-play"></i><span>Запустить</span></button>
      <button class="btn" onclick="openInNewTab()" title="Открыть"><i class="fa-solid fa-up-right-from-square"></i><span>Открыть</span></button>
      <button class="btn" onclick="downloadFile()" title="Ctrl+S"><i class="fa-solid fa-download"></i><span>Скачать</span></button>
    </div>
  </div>

  <div class="mc" id="mc">
    <div class="ep" id="ep" style="width:50%">
      <div class="et" id="et" style="display:none"></div>
      <div class="ew" id="ewH"><textarea id="cH"></textarea></div>
      <div class="ew h" id="ewC"><textarea id="cC"></textarea></div>
      <div class="ew h" id="ewJ"><textarea id="cJ"></textarea></div>
    </div>
    <div class="rz hz" id="rz"></div>
    <div class="pp" id="pp">
      <div class="ph">
        <div class="pt"><i class="fa-solid fa-eye"></i> Предпросмотр</div>
        <div class="purl">localhost:preview</div>
        <div style="display:flex;gap:4px">
          <button class="cbtn" onclick="toggleCon()" title="Консоль"><i class="fa-solid fa-terminal"></i></button>
          <button class="cbtn" onclick="refreshPreview()" title="Обновить"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
      </div>
      <div class="pfw"><iframe id="pf" sandbox="allow-scripts allow-modals allow-same-origin allow-forms allow-popups allow-pointer-lock"></iframe></div>
      <div class="cp" id="conP">
        <div class="chh">
          <div class="chl"><i class="fa-solid fa-terminal"></i> Консоль <span class="cbg" id="cBg">0</span></div>
          <div style="display:flex;gap:4px">
            <button class="cbtn" onclick="clearCon()"><i class="fa-solid fa-ban"></i></button>
            <button class="cbtn" onclick="toggleCon()"><i class="fa-solid fa-chevron-down" id="cIc"></i></button>
          </div>
        </div>
        <div class="cbd" id="cBd"><div class="ce">Консоль пуста.</div></div>
      </div>
    </div>
  </div>

  <div class="sb">
    <div class="sl"><div class="si"><div class="sd"></div> Готов</div><div class="si" id="sM">Один файл</div></div>
    <div class="sr"><div class="si" id="sC">Стр: 1, Стб: 1</div><div class="si" id="sCh">0</div><div class="si" id="sL">0</div></div>
  </div>
  <div class="tstc" id="tC"></div>

  <button id="aiFab" onclick="toggleAI()"><i class="fa-solid fa-robot"></i></button>
  <div id="aiChat" class="hidden">
    <div class="aiH">
      <h3><i class="fa-solid fa-wand-magic-sparkles"></i> ИИ Ассистент</h3>
      <button class="cbtn" onclick="toggleAI()" style="font-size:1rem"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="aiQa">
      <button class="aiQb" onclick="quickAI('Объясни выделенный код или весь файл')"><i class="fa-solid fa-circle-info"></i> Объясни</button>
      <button class="aiQb" onclick="quickAI('Найди и исправь все ошибки и баги в коде')"><i class="fa-solid fa-bug"></i> Исправь ошибки</button>
      <button class="aiQb" onclick="quickAI('Оптимизируй код: сделай его короче и быстрее')"><i class="fa-solid fa-bolt"></i> Оптимизируй</button>
      <button class="aiQb" onclick="quickAI('Добавь подробные комментарии к коду')"><i class="fa-solid fa-comment"></i> Закомментируй</button>
      <button class="aiQb" onclick="quickAI('Добавь адаптивность под мобильные устройства')"><i class="fa-solid fa-mobile-screen"></i> Адаптив</button>
      <button class="aiQb" onclick="quickAI('Улучши дизайн: сделай современнее и красивее')"><i class="fa-solid fa-palette"></i> Улучши дизайн</button>
    </div>
    <div class="aiMs" id="aiMs">
      <div class="aiM b">Привет! Я меняю код <strong>кусками</strong>, как Copilot. Выделите код в редакторе для точечных правок. Или просто опишите, что нужно сделать.</div>
    </div>
    <div class="aiIn">
      <textarea id="aiIn" placeholder="Опишите изменение..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI()}"></textarea>
      <button id="aiSnd" onclick="sendAI()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>

  <script>
    // === Состояние ===
    let curMode='single',autoRun=true,isHoriz=true,isSwapped=false,debTimer=null,actTab='html',errCnt=0;

    const sTmpl=`<!DOCTYPE html>\n<html lang="ru">\n<head>\n  <meta charset="UTF-8">\n  <title>Моя страница</title>\n  <style>\n    body { background: #0f0f1a; color: #eee; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; flex-direction: column; }\n    h1 { color: #00d4aa; font-size: 2.5rem; }\n    p { color: #8b949e; margin: 12px 0 24px; }\n    button { background: #00d4aa; border: none; padding: 12px 28px; border-radius: 10px; cursor: pointer; color: #000; font-weight: bold; font-size: 1rem; transition: transform .2s; }\n    button:hover { transform: scale(1.05); }\n  </style>\n</head>\n<body>\n  <h1>CodePad + AI</h1>\n  <p>Выделите код и попросите ИИ что-нибудь изменить.</p>\n  <button onclick="alert('Работает!')">Нажми меня</button>\n</body>\n</html>`;
    const mH=`<!DOCTYPE html>\n<html lang="ru">\n<head>\n  <meta charset="UTF-8">\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1>Раздельные файлы</h1>\n  <script src="script.js"><\/script>\n</body>\n</html>`;
    const mC=`h1 { color: #00d4aa; }`;const mJ=`console.log('JS!');`;
    const cPr=`<`+`script>(function(){var o={log:console.log,warn:console.warn,error:console.error};function s(l,a){try{var m=Array.from(a).map(function(v){if(v===null)return'null';if(v===undefined)return'undefined';if(typeof v==='object'){try{return JSON.stringify(v,null,2)}catch(e){return String(v)}}return String(v)}).join(' ');parent.postMessage({type:'cpc',level:l,message:m},'*')}catch(e){}if(l==='error')o.error.apply(console,a);else if(l==='warn')o.warn.apply(console,a);else o.log.apply(console,a)}console.log=function(){s('log',arguments)};console.warn=function(){s('warn',arguments)};console.error=function(){s('error',arguments)};window.onerror=function(m,u,l){s('error',['Error: '+m+' (строка '+l+')'])};window.addEventListener('unhandledrejection',function(e){s('error',['Promise: '+(e.reason&&e.reason.message?e.reason.message:e.reason)])})})()<`+`/script>`;
    let eH,eC,eJ;

    function initEd(){const b={lineNumbers:true,autoCloseTags:true,autoCloseBrackets:true,matchBrackets:true,styleActiveLine:true,tabSize:2,indentWithTabs:false,lineWrapping:false,theme:'material-darker'};eH=CodeMirror.fromTextArea(document.getElementById('cH'),{...b,mode:'htmlmixed'});eC=CodeMirror.fromTextArea(document.getElementById('cC'),{...b,mode:'css'});eJ=CodeMirror.fromTextArea(document.getElementById('cJ'),{...b,mode:'javascript'});eH.setValue(sTmpl);eC.setValue(mC);eJ.setValue(mJ);[eH,eC,eJ].forEach(ed=>{ed.on('change',()=>{updSt();if(autoRun){clearTimeout(debTimer);debTimer=setTimeout(runCode,400)}});ed.on('cursorActivity',updSt)})}
    function updSt(){const ed=getAE();if(!ed)return;const v=ed.getValue(),c=ed.getCursor();document.getElementById('sCh').textContent=v.length+' сим';document.getElementById('sL').textContent=ed.lineCount()+' стр';document.getElementById('sC').textContent=`Стр: ${c.line+1}, Стб: ${c.ch+1}`}

    function setMode(m){const p=curMode;curMode=m;document.querySelectorAll('.mb').forEach(b=>b.classList.toggle('a',b.dataset.mode===m));const t=document.getElementById('et');if(m==='single'){t.style.display='none';if(p==='multi')eH.setValue(sTmpl);showEd('html');document.getElementById('sM').textContent='Один файл'}else{t.style.display='flex';if(p==='single'){eH.setValue(mH);eC.setValue(mC);eJ.setValue(mJ)}swTab('html');document.getElementById('sM').textContent='Раздельные'}renTabs();runCode()}
    function renTabs(){const t=document.getElementById('et');if(curMode==='single'){t.innerHTML='';return}const tabs=[{id:'html',l:'index.html',d:'dh'},{id:'css',l:'style.css',d:'dc'},{id:'js',l:'script.js',d:'dj'}];t.innerHTML=tabs.map(t=>`<button class="etab ${t.id===actTab?'a':''}" onclick="swTab('${t.id}')"><span class="dot ${t.d}"></span>${t.l}</button>`).join('')}
    function swTab(t){actTab=t;showEd(t);renTabs();updSt();const ed=getAE();if(ed)setTimeout(()=>{ed.refresh();ed.focus()},30)}
    function showEd(t){['html','css','js'].forEach(x=>{document.getElementById('ew'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('h',x!==t)});setTimeout(()=>[eH,eC,eJ].forEach(e=>e.refresh()),20)}
    function buildOut(){let r;if(curMode==='single'){r=eH.getValue()}else{const h=eH.getValue(),c=eC.getValue(),j=eJ.getValue();r=h;r=r.replace(/<link[^>]*href=["']style\.css["'][^>]*\/?>/gi,`<style>${c}</style>`);r=r.replace(/<script[^>]*src=["']script\.js["'][^>]*><\/script>/gi,`<script>${j}<\/script>`);if(c.trim()&&!r.includes(c))r=r.replace('</head>',`<style>${c}</style>\n</head>`);if(j.trim()&&!r.includes(j))r=r.replace('</body>',`<script>${j}<\/script>\n</body>`)}if(r.includes('<head>'))r=r.replace('<head>','<head>'+cPr);else r=cPr+r;return r}
    function runCode(){clearCon();document.getElementById('pf').srcdoc=buildOut()}

    function appCon(lv,msg){const b=document.getElementById('cBd'),e=b.querySelector('.ce');if(e)e.remove();const d=document.createElement('div');d.className='cmsg '+lv;const ico={log:'fa-chevron-right',warn:'fa-triangle-exclamation',error:'fa-circle-xmark'};d.innerHTML=`<span class="mi"><i class="fa-solid ${ico[lv]||ico.log}"></i></span><span class="mt">${msg.replace(/</g,'&lt;')}</span>`;b.appendChild(d);b.scrollTop=b.scrollHeight;if(lv==='error'){errCnt++;updBdg();const p=document.getElementById('conP');if(p.classList.contains('col'))toggleCon()}}

    function downloadFile(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([buildOut()],{type:'text/html'}));a.download='index.html';a.click();toast('Скачано')}
    function toggleAutoRun(){autoRun=!autoRun;document.getElementById('arT').classList.toggle('a',autoRun);toast(autoRun?'Автозапуск вкл':'Автозапуск выкл')}
    function toggleLayout(){isHoriz=!isHoriz;const c=document.getElementById('mc'),r=document.getElementById('rz'),e=document.getElementById('ep');c.classList.toggle('v',!isHoriz);r.classList.toggle('hz',isHoriz);r.classList.toggle('vt',!isHoriz);e.style.width='';e.style.height='';e.style.flex='1';setTimeout(()=>[eH,eC,eJ].forEach(e=>e.refresh()),50);toast(isHoriz?'Горизонтально':'Вертикально')}
    function swapPanels(){isSwapped=!isSwapped;const c=document.getElementById('mc'),e=document.getElementById('ep'),p=document.getElementById('pp'),r=document.getElementById('rz');if(isSwapped){c.insertBefore(p,e);c.insertBefore(r,e)}else{c.insertBefore(e,r);c.insertBefore(r,p)}toast('Панели поменяны')}
    function initRz(){const r=document.getElementById('rz'),c=document.getElementById('mc'),ep=document.getElementById('ep');let d=false;function s(e){d=true;r.classList.add('a');document.body.style.cursor=isHoriz?'col-resize':'row-resize';document.body.style.userSelect='none';document.getElementById('pf').style.pointerEvents='none';e.preventDefault()}function m(x,y){if(!d)return;const b=c.getBoundingClientRect();if(isHoriz){ep.style.width=Math.max(15,Math.min(85,((x-b.left)/b.width)*100))+'%';ep.style.flex='none'}else{ep.style.height=Math.max(15,Math.min(85,((y-b.top)/b.height)*100))+'%';ep.style.flex='none'}}function end(){if(!d)return;d=false;r.classList.remove('a');document.body.style.cursor='';document.body.style.userSelect='';document.getElementById('pf').style.pointerEvents='';[eH,eC,eJ].forEach(e=>e.refresh())}r.addEventListener('mousedown',s);document.addEventListener('mousemove',e=>m(e.clientX,e.clientY));document.addEventListener('mouseup',end);r.addEventListener('touchstart',s,{passive:false});document.addEventListener('touchmove',e=>{if(d)m(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});document.addEventListener('touchend',end)}
    function toast(msg){const c=document.getElementById('tC'),t=document.createElement('div');t.className='tst';t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.classList.add('fo');setTimeout(()=>t.remove(),300)},2000)}
    document.addEventListener('keydown',e=>{const m=e.ctrlKey||e.metaKey;if(m&&e.key==='Enter'){e.preventDefault();runCode();toast('Запущено')}if(m&&e.key==='s'){e.preventDefault();downloadFile()}if(m&&e.shiftKey&&(e.key==='O'||e.key==='o')){e.preventDefault();openInNewTab()}});

    // === ИИ АССИСТЕНТ (исправленная версия) =====
    // =============================================
    let aiOpen=false,aiLoading=false;

    function toggleAI(){aiOpen=!aiOpen;document.getElementById('aiChat').classList.toggle('hidden',!aiOpen);if(aiOpen)document.getElementById('aiIn').focus()}
    function quickAI(cmd){document.getElementById('aiIn').value=cmd;sendAI()}

    // --- Извлечение текста из ответа ИИ ---
    function extractContent(raw){
      // 1) Попробуем распарсить как JSON
      try {
        const j = JSON.parse(raw);
        // OpenAI-совместимый формат: { choices: [{ message: { content } }] }
        if(j.choices && j[0]?.message?.content) return j.choices[0].message.content;
        if(j.choices && j.choices[0]?.message?.content) return j.choices[0].message.content;
        // Формат { content: "..." }
        if(typeof j.content === 'string' && j.content.trim()) return j.content;
        // Формат { text: "..." }
        if(typeof j.text === 'string' && j.text.trim()) return j.text;
        // Формат { output: "..." }
        if(typeof j.output === 'string' && j.output.trim()) return j.output;
        // Если есть reasoning но нет контента — это «думающая» модель, вернём null
        if(j.reasoning || j.reasoning_content) return null;
        // Массив сообщений
        if(Array.isArray(j)){
          const last = j[j.length-1];
          if(last?.content) return last.content;
        }
      } catch(e) { /* не JSON — хорошо, это обычный текст */ }

      // 2) Обычный текст — проверим, не содержит ли он JSON-мусор
      let text = raw.trim();

      // Если текст начинается с { и содержит "reasoning" — попытаемся вытащить контент
      if(text.startsWith('{') && text.includes('"reasoning"')){
        try{
          const j=JSON.parse(text);
          if(j.content) return j.content;
          return null; // Мусорный ответ reasoning-модели
        }catch(e){}
      }

      // Если текст выглядит как валидный ответ (содержит SEARCH/REPLACE, код или просто текст)
      if(text.length > 5) return text;

      return null;
    }

    // --- Вызов ИИ с фоллбэком по моделям ---
    async function callAI(sysPrompt, userMsg){
      // Список моделей по приоритету (не-reasoning модели)
      const models = ['mistral', 'llama', 'qwen'];

      for(const model of models){
        try{
          const controller = new AbortController();
          const tid = setTimeout(() => controller.abort(), 30000);

          const resp = await fetch('https://text.pollinations.ai/', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            signal: controller.signal,
            body: JSON.stringify({
              messages:[
                {role:'system', content:sysPrompt},
                {role:'user', content:userMsg}
              ],
              model: model,
              temperature: 0.3,
              max_tokens: 4096
            })
          });

          clearTimeout(tid);

          if(!resp.ok) continue;

          const raw = await resp.text();
          const content = extractContent(raw);

          if(content && content.trim().length > 3){
            return content;
          }
          // Контент не извлечён (reasoning-мусор) — пробуем следующую модель
          continue;
        }catch(e){
          // Таймаут или сетевая ошибка — следующая модель
          continue;
        }
      }

      throw new Error('Не удалось получить ответ от ИИ. Попробуйте позже.');
    }

    // --- Основная функция отправки ---
    async function sendAI(){
      if(aiLoading)return;
      const inp=document.getElementById('aiIn');
      const prompt=inp.value.trim();
      if(!prompt)return;
      inp.value='';inp.style.height='auto';
      addAM('u',prompt);

      const msgs=document.getElementById('aiMs');
      const ty=document.createElement('div');ty.className='aiTy';ty.innerHTML='<span></span><span></span><span></span>';
      msgs.appendChild(ty);msgs.scrollTop=msgs.scrollHeight;
      aiLoading=true;document.getElementById('aiSnd').disabled=true;

      try{
        const code=eH.getValue();
        const sel=getSel();
        let userMsg='';
        if(sel){
          userMsg=`Вот мой код (полный файл):\n\`\`\`html\n${code}\n\`\`\`\n\nПользователь выделил этот фрагмент:\n\`\`\`\n${sel.text}\n\`\`\`\n\nЗадача: ${prompt}\nСосредоточься на выделенном фрагменте, но учитывай контекст всего файла.`;
        }else{
          userMsg=`Вот мой код:\n\`\`\`html\n${code}\n\`\`\`\n\nЗадача: ${prompt}`;
        }

        const sysPrompt=`Ты — эксперт-программист. Пользователь даст HTML/CSS/JS код (в одном файле) и задачу.

ВАЖНО: НЕ переписывай весь код! Используй формат SEARCH/REPLACE для точечных правок:

<<<<<<< SEARCH
точный кусок старого кода (должен совпадать символ в символ с оригиналом)
=======
новый кусок кода
>>>>>>> REPLACE

Правила:
1. Используй один или несколько блоков SEARCH/REPLACE
2. Код в SEARCH должен ТОЧНО совпадать с оригиналом (включая пробелы и переносы)
3. Если нужно добавить код — поставь в SEARCH соседнюю строку и добавь новый код рядом
4. Если просят объяснить — просто ответь текстом, без блоков SEARCH/REPLACE
5. Если изменений так много, что затронут весь файл — верни весь код в \`\`\`html ... \`\`\`
6. Отвечай на русском. Будь краток. Не пиши лишнего текста, только код или ответ.`;

        const text = await callAI(sysPrompt, userMsg);
        ty.remove();

        // Парсим SEARCH/REPLACE блоки
        const diffs=[];
        const srRegex=/<<<<<<< SEARCH\s*\n([\s\S]*?)\n=======\s*\n([\s\S]*?)\n>>>>>>> REPLACE/g;
        let match;
        while((match=srRegex.exec(text))!==null){
          diffs.push({search:match[1],replace:match[2]});
        }

        if(diffs.length>0){
          // Показываем патчи
          diffs.forEach((d,i)=>{
            const div=document.createElement('div');div.className='aiM b';
            const diffDiv=document.createElement('div');diffDiv.className='aiDiff';
            const diffH=document.createElement('div');diffH.className='aiDiffH';
            diffH.innerHTML=`<span>Изменение ${i+1}</span><span class="diff-status" style="color:var(--fgm)">Ожидает</span>`;
            const diffPre=document.createElement('div');diffPre.className='aiDiffPre';
            const sLines=d.search.split('\n'),rLines=d.replace.split('\n');
            let dh='';
            sLines.forEach(l=>{dh+=`<span class="del">- ${l}</span>\n`});
            rLines.forEach(l=>{dh+=`<span class="add">+ ${l}</span>\n`});
            diffPre.innerHTML=dh;
            diffDiv.appendChild(diffH);diffDiv.appendChild(diffPre);
            div.appendChild(diffDiv);

            const btn=document.createElement('button');btn.className='aiAp';btn.textContent='Применить';
            btn.onclick=()=>{
              const cur=eH.getValue();
              if(cur.includes(d.search)){
                eH.setValue(cur.replace(d.search,d.replace));
                btn.textContent='Применено!';btn.disabled=true;btn.style.opacity='.5';
                diffH.querySelector('.diff-status').textContent='Применено';diffH.querySelector('.diff-status').style.color='var(--acc)';
                toast('Изменение '+(i+1)+' применено');
              }else{
                btn.textContent='Не найдено!';btn.disabled=true;btn.style.background='var(--err)';
                diffH.querySelector('.diff-status').textContent='Ошибка';diffH.querySelector('.diff-status').style.color='var(--err)';
                toast('Кусок кода не найден — возможно уже изменён');
              }
            };
            div.appendChild(btn);msgs.appendChild(div);
          });

          // Кнопка "Применить все"
          if(diffs.length>1){
            const allD=document.createElement('div');allD.className='aiM b';
            const allB=document.createElement('button');allB.className='aiAp';
            allB.innerHTML='<i class="fa-solid fa-check-double"></i> Применить все изменения';
            allB.onclick=()=>{
              let cur=eH.getValue(),ok=0;
              diffs.forEach(d=>{if(cur.includes(d.search)){cur=cur.replace(d.search,d.replace);ok++}});
              eH.setValue(cur);
              allB.textContent=`Применено ${ok}/${diffs.length}`;allB.disabled=true;allB.style.opacity='.5';
              msgs.querySelectorAll('.aiAp').forEach(b=>{if(b!==allB){b.textContent='Применено';b.disabled=true;b.style.opacity='.5'}});
              msgs.querySelectorAll('.diff-status').forEach(s=>{s.textContent='Применено';s.style.color='var(--acc)'});
              toast(`Применено ${ok}/${diffs.length} изменений`);
            };
            allD.appendChild(allB);msgs.appendChild(allD);
          }
        }else{
          // Проверяем полный код в markdown-блоке
          const codeMatch=text.match(/```(?:html)?\s*\n([\s\S]*?)\n```/);
          if(codeMatch){
            const div=document.createElement('div');div.className='aiM b';
            div.innerHTML='ИИ вернул полный код. Нажмите кнопку ниже, чтобы заменить.';
            const btn=document.createElement('button');btn.className='aiAp';btn.textContent='Заменить весь код';
            btn.onclick=()=>{eH.setValue(codeMatch[1]);btn.textContent='Заменено!';btn.disabled=true;btn.style.opacity='.5';toast('Код заменён')};
            div.appendChild(btn);msgs.appendChild(div);
          }else{
            // Просто текстовый ответ
            const fmt=text.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
            addAM('b',fmt);
          }
        }
      }catch(err){
        ty.remove();
        addAM('b','<span class="aiErr">Ошибка: '+err.message+'</span>');
      }

      aiLoading=false;document.getElementById('aiSnd').disabled=false;
      msgs.scrollTop=msgs.scrollHeight;
    }

    function addAM(role,html){
      const m=document.getElementById('aiMs'),d=document.createElement('div');
      d.className='aiM '+(role==='u'?'u':'b');d.innerHTML=html;m.appendChild(d);m.scrollTop=m.scrollHeight;
    }

    // === Запуск ===
    window.addEventListener('DOMContentLoaded',()=>{
      initEd();renTabs();initRz();updSt();setTimeout(runCode,150);
      const aiIn=document.getElementById('aiIn');
      aiIn.addEventListener('input',()=>{aiIn.style.height='auto';aiIn.style.height=Math.min(aiIn.scrollHeight,100)+'px'});
    });
  </script>
